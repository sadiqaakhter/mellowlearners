<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mellow Learners | Story-Based STEM Missions for Kids</title>
    <meta
      name="description"
      content="Mellow Learners turns illustrated STEM books into free-first AI, coding, 3D design, data, and engineering missions for children ages 8-14."
    />
    <script>
      (function() {
        // Fix for "Cannot set property fetch of #<Window> which has only a getter"
        // This often happens in sandboxed environments where window.fetch is read-only.
        try {
          const patchFetch = (obj) => {
            const descriptor = Object.getOwnPropertyDescriptor(obj, 'fetch');
            if (descriptor && descriptor.get && !descriptor.set) {
              Object.defineProperty(obj, 'fetch', {
                get: descriptor.get,
                set: function(v) {
                  Object.defineProperty(this, 'fetch', {
                    value: v,
                    writable: true,
                    configurable: true,
                    enumerable: true
                  });
                },
                configurable: true
              });
              return true;
            }
            return false;
          };

          if (!patchFetch(window)) {
            patchFetch(Object.getPrototypeOf(window));
          }
        } catch (e) {
          console.warn('Fetch patch failed:', e);
        }

        window.global = window;
        window.process = window.process || { 
          env: { NODE_ENV: 'development' },
          nextTick: function(fn) { setTimeout(fn, 0); },
          browser: true
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
